syntax = "proto3";

package calificaciones;

// Servicio gRPC del MS-4 Calificaciones & Ponderaciones
// Este servicio provee datos calculados a otros microservicios (como MS-7 Reportes)
service CalificacionesService {
  // Obtiene el listado completo de notas de una materia
  rpc GetConcentrado(GetConcentradoRequest) returns (GetConcentradoResponse);
  
  // Obtiene el promedio específico de un estudiante
  rpc GetPromedioAlumno(GetPromedioAlumnoRequest) returns (GetPromedioAlumnoResponse);
  
  // Obtiene métricas generales de rendimiento para una materia
  rpc GetEstadisticasMateria(GetEstadisticasMateriaRequest) returns (GetEstadisticasMateriaResponse);
}

// --- Mensajes para GetConcentrado ---

message GetConcentradoRequest {
  string materia_id = 1;
}

message AlumnoCalif {
  string alumno_id = 1;
  string matricula = 2;
  string nombre_completo = 3;
  float promedio_real = 4;
  int32 promedio_redondeado = 5;
  // Valores esperados: APROBADO | REPROBADO | EN_RIESGO
  string estatus = 6; 
}

message GetConcentradoResponse {
  repeated AlumnoCalif alumnos = 1;
}

// --- Mensajes para GetPromedioAlumno ---

message GetPromedioAlumnoRequest {
  string alumno_id = 1;
  string materia_id = 2;
}

message GetPromedioAlumnoResponse {
  string alumno_id = 1;
  string materia_id = 2;
  float promedio_real = 3;
  int32 promedio_redondeado = 4;
}

// --- Mensajes para GetEstadisticasMateria ---

message GetEstadisticasMateriaRequest {
  string materia_id = 1;
}

message GetEstadisticasMateriaResponse {
  string materia_id = 1;
  int32 total_alumnos = 2;
  int32 aprobados = 3;
  int32 reprobados = 4;
  int32 en_riesgo = 5;
  float promedio_grupal = 6;
  float calificacion_maxima = 7;
  float calificacion_minima = 8;
}